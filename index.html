    function setColor(token, hex) {
      if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
      state.colors[token] = hex;
      if (state.links.tailMatchesMane && LINK_MAP_MANE_TO_TAIL.has(token)) {
        const tailTok = LINK_MAP_MANE_TO_TAIL.get(token);
        state.colors[tailTok] = hex;
      }
      reapplyAllColors();
    }

    // =========================
    // =========================
    // 6.5) EYE OVERLAY (iris + glimmer clipped to eye-white)
    // =========================
    let EYE_OVERLAY_ID = "eyeOverlayGroup";
    let EYE_CLIP_ID = "eyeOverlayClip";

    let EYE_SCALE_ID = EYE_OVERLAY_ID + "_scale";

    function clearEyeOverlay() {
      document.querySelectorAll(`#stage-content [data-eye-overlay="1"]`).forEach(n => n.remove());
      const clip = document.getElementById(EYE_CLIP_ID);
      if (clip) clip.remove();
    }

    function findEyeWhiteNodes() {
      const candidates = document.querySelectorAll("#stage-content path, #stage-content rect, #stage-content circle, #stage-content ellipse, #stage-content polygon, #stage-content polyline, #stage-content use, #stage-content g");
      const nodes = [];
      candidates.forEach(el => {
        const tok = getEffectiveToken(el);
        if (tok === "eye-white") nodes.push(el);
      });
      return nodes;
    }

    function ensureEyeClipFrom(nodes) {
  const defs = document.getElementById("stage-defs");
  let cp = document.getElementById(EYE_CLIP_ID);
  if (cp) cp.remove();
  cp = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
  cp.setAttribute("id", EYE_CLIP_ID);
  cp.setAttribute("clipPathUnits", "userSpaceOnUse");

  // Build the clipPath by referencing the exact rendered eye-white nodes via <use>.
  // This preserves all transforms from the source nodes so the clip matches visuals.
  let seq = 0;
  nodes.forEach((el) => {
    let srcId = el.getAttribute("id");
    if (!srcId) {
      srcId = "eyeClipSrc_" + (++seq) + "_" + Math.floor(Math.random()*1e6);
      el.setAttribute("id", srcId);
    }
    const u = document.createElementNS("http://www.w3.org/2000/svg", "use");
    u.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", "#" + srcId);
    u.setAttribute("href", "#" + srcId);
    cp.appendChild(u);
  });

  defs.appendChild(cp);
  return cp;
}

    function hideBaseIrisPupil() {
      const q = "#stage-content [color='iris'], #stage-content [data-color='iris'], #stage-content [style*='color: iris'], #stage-content [color='iris-1'], #stage-content [data-color='iris-1'], #stage-content [style*='color: iris-1'], #stage-content [color='iris-2'], #stage-content [data-color='iris-2'], #stage-content [style*='color: iris-2'], #stage-content [color='pupil'], #stage-content [data-color='pupil'], #stage-content [style*='color: pupil']";
      document.querySelectorAll(q).forEach(el => {
        if (el.closest("[data-eye-overlay='1']")) return;
        el.setAttribute("display","none");
        const style = el.getAttribute("style") || "";
        if (!/display\s*:/.test(style)) {
          el.setAttribute("style", (style ? style + ";" : "") + "display:none");
        } else {
          el.setAttribute("style", style.replace(/display\s*:\s*[^;]+/,"display:none"));
        }
      });
    }

    async function loadOverlayAssetToGroup(category, fileName, group) {
      if (!fileName) return;
      const url = `assets/${category}/${fileName}`;
      try {
        const txt = await readSVGText(url, category, fileName);
        const parser = new DOMParser();
        const doc = parser.parseFromString(txt, "image/svg+xml");
        const svg = doc.documentElement;
        if (svg.nodeName !== "svg") return;
        const idPrefix = `eye_${category}_${fileName.replace(/[^a-z0-9]+/gi,"_")}__`;
        const wrap = document.createElementNS("http://www.w3.org/2000/svg","g");
        Array.from(svg.children).forEach(ch => {
          if (ch.tagName && ch.tagName.toLowerCase() !== "defs") wrap.appendChild(ch.cloneNode(true));
        });
        prefixIds(wrap, idPrefix);
        removeSvgTooltips(wrap);
        unhideTree(wrap);
        applyColorsToNode(wrap);
        while (wrap.firstChild) group.appendChild(wrap.firstChild);
      } catch (e) {
        console.warn("Eye overlay asset failed:", url, e);
      }
    }

    async function refreshEyeOverlay() {

  clearEyeOverlay();
  const eyeNodes = findEyeWhiteNodes();
  if (!eyeNodes.length) return;

  ensureEyeClipFrom(eyeNodes);

  const last = eyeNodes[eyeNodes.length - 1];
  const gOuter = document.createElementNS("http://www.w3.org/2000/svg","g");
  gOuter.setAttribute("data-eye-overlay","1");
  gOuter.setAttribute("id", EYE_OVERLAY_ID);
  gOuter.setAttribute("clip-path", `url(#${EYE_CLIP_ID})`);

  last.parentNode.insertBefore(gOuter, last.nextSibling);

  // Create scale group (for zoom) and inner content (for offsets)
  const gScale = document.createElementNS("http://www.w3.org/2000/svg","g");
  gScale.setAttribute("id", EYE_SCALE_ID);
  const gInner = document.createElementNS("http://www.w3.org/2000/svg","g");
  gInner.setAttribute("id", EYE_OVERLAY_ID + "_content");
  gScale.appendChild(gInner);
  gOuter.appendChild(gScale);


  // Compute eye pivot (center of union bbox of eye-white nodes)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  eyeNodes.forEach(el => {
    try {
      const b = el.getBBox();
      if (isFinite(b.x) && isFinite(b.y) && isFinite(b.width) && isFinite(b.height)) {
        minX = Math.min(minX, b.x);
        minY = Math.min(minY, b.y);
        maxX = Math.max(maxX, b.x + b.width);
        maxY = Math.max(maxY, b.y + b.height);
      }
    } catch(e) {}
  });
  let cx = isFinite(minX) && isFinite(maxX) ? (minX + maxX)/2 : 500;
  let cy = isFinite(minY) && isFinite(maxY) ? (minY + maxY)/2 : 500;
  gScale.dataset.pivotX = String(cx);
  gScale.dataset.pivotY = String(cy);

  // Apply initial transforms for scale and offsets
  const s = state.eyeOverlay.scale || 1;
  gScale.setAttribute("transform", `translate(${cx}, ${cy}) scale(${s}) translate(${-cx}, ${-cy})`);
  const ox = state.eyeOverlay.offsetX || 0;
  const oy = state.eyeOverlay.offsetY || 0;
  if (ox !== 0 || oy !== 0) {
    gInner.setAttribute("transform", `translate(${ox}, ${oy})`);
  } else {
    gInner.removeAttribute("transform");
  }
// Load assets into the inner (translated) group
  if (state.eyeOverlay.iris)    await loadOverlayAssetToGroup("iris",    state.eyeOverlay.iris,    gInner);
  if (state.eyeOverlay.glimmer) await loadOverlayAssetToGroup("glimmer", state.eyeOverlay.glimmer, gInner);

  if (gInner.childNodes.length > 0) hideBaseIrisPupil();
}

    function updateEyeOverlayTransform() {
  const gInner = document.getElementById(EYE_OVERLAY_ID + "_content");
  const gScale = document.getElementById(EYE_SCALE_ID);
  if (!gInner || !gScale) { refreshEyeOverlay(); return; }
  const tx = state.eyeOverlay.offsetX || 0;
  const ty = state.eyeOverlay.offsetY || 0;
  if (tx === 0 && ty === 0) gInner.removeAttribute("transform");
  else gInner.setAttribute("transform", `translate(${tx}, ${ty})`);

  const s = state.eyeOverlay.scale || 1;
  const cx = parseFloat(gScale.dataset.pivotX || "500");
  const cy = parseFloat(gScale.dataset.pivotY || "500");
  gScale.setAttribute("transform", `translate(${cx}, ${cy}) scale(${s}) translate(${-cx}, ${-cy})`);

}


    // 7) NAKŁADKA KRYSZTAŁOWA + INTERAKTYWNY POŁYSK
    // =========================
    const STAGE_W = 1000, STAGE_H = 1000;
    const SHAPE_TAGS = new Set(["path","rect","circle","ellipse","polygon","polyline","use"]);

    function hasRenderableFill(el) {
      if (!el || !SHAPE_TAGS.has(el.tagName?.toLowerCase?.() || "")) return false;
      if (usesPaintServer(el, "fill")) return true;
      const f = attrOrStyle(el, "fill");
      return !!f && f.toLowerCase() !== "none";
    }
    function clearCrystalClones() {
      document.querySelectorAll("#stage-content [data-crystal='1']").forEach(n => n.remove());
    }

    // Prevents older async Crystal Overlay refreshes from drawing over newer scene state.
    let CRYSTAL_REFRESH_SEQ = 0;

    async function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onerror = () => reject(new Error("FileReader error"));
        fr.onload = () => resolve(fr.result);
        fr.readAsDataURL(file);
      });
    }
    async function getCrystalTextureURL(fileName) {
      if (!fileName) return null;
      if (useVirtualFS) {
        const key = `assets/crystal/${fileName}`;
        const f = virtualFS.get(key);
        if (!f) { console.warn("Brak pliku tekstury w virtualFS:", key); return null; }
        return await fileToDataURL(f); // osadzamy jako dataURL (eksport-friendly)
      } else {
        return `assets/crystal/${fileName}`;
      }
    }

    // ——— Wzór kryształu (pattern) ———
    function ensureDefsPattern() {
      let pat = document.getElementById("crystalPattern");
      if (!pat) {
        pat = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
        pat.setAttribute("id","crystalPattern");
        pat.setAttribute("patternUnits","userSpaceOnUse");
        pat.setAttribute("width", String(STAGE_W));
        pat.setAttribute("height", String(STAGE_H));
        const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
        img.setAttribute("id","crystalImage");
        img.setAttribute("x","0"); img.setAttribute("y","0");
        img.setAttribute("width", String(STAGE_W));
        img.setAttribute("height", String(STAGE_H));
        img.setAttribute("preserveAspectRatio","xMidYMid slice");
        pat.appendChild(img);
        document.getElementById("stage-defs").appendChild(pat);
      }
      return pat;
    }
    async function ensureCrystalPattern(textureFile) {
      const pat = ensureDefsPattern();
      const img = pat.querySelector("#crystalImage");
      const url = await getCrystalTextureURL(textureFile);
      if (!url) return;
      img.setAttributeNS("http://www.w3.org/1999/xlink","xlink:href", url);
      img.setAttribute("href", url);
      // bazowy transform (parallax dołożymy na bieżąco przy ruchu myszy)
      const s = state.crystal.scale || 1;
      const a = state.crystal.angle || 0;
      pat.setAttribute("patternTransform", `rotate(${a} ${STAGE_W/2} ${STAGE_H/2}) scale(${s})`);
    }
    function updatePatternParallax(mx, my) {
      // mx,my ∈ [0,1] — pozycja kursora w układzie sceny
      const pat = document.getElementById("crystalPattern");
      if (!pat) return;
      const s = state.crystal.scale || 1;
      const a = state.crystal.angle || 0;
      const p = state.crystal.parallax || 0;
      const tx = (mx - 0.5) * p;
      const ty = (my - 0.5) * p;
      // najpierw translate (parallax), potem rotate wokół środka i scale
      pat.setAttribute("patternTransform", `translate(${tx} ${ty}) rotate(${a} ${STAGE_W/2} ${STAGE_H/2}) scale(${s})`);
    }

    // ——— Połysk: radialny gradient, który śledzi mysz ———
    function ensureSheenGradient() {
      let g = document.getElementById("crystalSheen");
      if (!g) {
        g = document.createElementNS("http://www.w3.org/2000/svg","radialGradient");
        g.setAttribute("id","crystalSheen");
        g.setAttribute("gradientUnits","userSpaceOnUse"); // w jednostkach sceny
        const s0 = document.createElementNS("http://www.w3.org/2000/svg","stop");
        const s1 = document.createElementNS("http://www.w3.org/2000/svg","stop");
        s0.setAttribute("offset","0");
        s1.setAttribute("offset","1");
        g.appendChild(s0); g.appendChild(s1);
        document.getElementById("stage-defs").appendChild(g);
      }
      return g;
    }
    function updateSheenGradient(cx, cy) {
      const g = ensureSheenGradient();
      const r = Math.max(10, state.crystal.sheenRadius || 260);
      g.setAttribute("cx", String(cx));
      g.setAttribute("cy", String(cy));
      g.setAttribute("r",  String(r));
      const s0 = g.children[0], s1 = g.children[1];
      const alpha = clamp01(state.crystal.sheenOpacity || 0.25);
      s0.setAttribute("stop-color", "#ffffff");
      s0.setAttribute("stop-opacity", String(alpha));
      s1.setAttribute("stop-color", "#ffffff");
      s1.setAttribute("stop-opacity", "0");
    }

    // ——— Hue-shift: filtr feColorMatrix, sterowany myszą ———
    function ensureHueFilter() {
      let f = document.getElementById("crystalHue");
      if (!f) {
        f = document.createElementNS("http://www.w3.org/2000/svg","filter");
        f.setAttribute("id","crystalHue");
        const m = document.createElementNS("http://www.w3.org/2000/svg","feColorMatrix");
        m.setAttribute("type","hueRotate");
        m.setAttribute("values","0");
        f.appendChild(m);
        document.getElementById("stage-defs").appendChild(f);
      }
      return f;
    }
    function updateHueFilter(angleDeg) {
      const f = ensureHueFilter();
      const m = f.firstElementChild;
      m.setAttribute("values", String(angleDeg || 0));
    }

    function isCrystalTarget(el) {
      if (!SHAPE_TAGS.has(el.tagName?.toLowerCase?.() || "")) return false;
      if (el.closest?.("[data-crystal='1']")) return false;
      if (el.closest?.("[data-eye-overlay='1']")) return false;
      if (el.closest?.("[data-cutiemark-wrapper='1']")) return false;
      const tok = getEffectiveToken(el);
      if (!tok) return false;
      if (isContourToken(tok)) return false;
      if (!CRYSTAL_TOKENS.has(tok)) return false;
      const mode = getEffectiveColorMode(el);
      if (!(mode === "fill" || mode === "both")) return false;
      return hasRenderableFill(el);
    }

    async function refreshCrystalOverlay() {
  const seq = ++CRYSTAL_REFRESH_SEQ;
  ensureCrystalMouseDefaults();
  clearCrystalClones();
  if (!state.crystal.enabled) return;

  const wantTexture = !!state.crystal.texture;
  const wantSheen   = !!state.crystal.shineEnabled;

  if (!wantTexture && !wantSheen) return;

  if (wantTexture) {
    await ensureCrystalPattern(state.crystal.texture);
    if (seq !== CRYSTAL_REFRESH_SEQ || !state.crystal.enabled) return;
    if (state.crystal.hueShiftEnabled) ensureHueFilter();
  } else {
    updateHueFilter(0);
  }

  if (seq !== CRYSTAL_REFRESH_SEQ || !state.crystal.enabled) return;

  if (wantSheen) ensureSheenGradient();

  // Clear once more after async texture loading. This avoids duplicated/opaque clones
  // when the user changes assets while an older overlay refresh is still resolving.
  clearCrystalClones();

  const candidates = document.querySelectorAll(
    "#stage-content path, #stage-content rect, #stage-content circle, #stage-content ellipse, #stage-content polygon, #stage-content polyline, #stage-content use"
  );

  for (const el of candidates) {
    if (seq !== CRYSTAL_REFRESH_SEQ || !state.crystal.enabled) return;
    if (!isCrystalTarget(el)) continue;

    if (wantTexture) {
      const tex = el.cloneNode(true);
      tex.setAttribute("data-crystal","1");
      tex.setAttribute("data-crystal-kind","tex");
      tex.setAttribute("fill", "url(#crystalPattern)");
      setStyleProp(tex, "fill", "url(#crystalPattern)");
      const alphaTex = String(Math.max(0, Math.min(1, state.crystal.intensity || 0.35)));
      tex.setAttribute("fill-opacity", alphaTex);
      setStyleProp(tex, "fill-opacity", alphaTex);
      tex.setAttribute("stroke","none");
      setStyleProp(tex, "stroke","none");
      tex.setAttribute("pointer-events","none");
      if (state.crystal.hueShiftEnabled) {
        tex.setAttribute("filter","url(#crystalHue)");
        setStyleProp(tex,"filter","url(#crystalHue)");
      } else {
        tex.removeAttribute("filter");
      }
      el.parentNode.insertBefore(tex, el.nextSibling);
    }

    if (wantSheen) {
      const sheen = el.cloneNode(true);
      sheen.setAttribute("data-crystal","1");
      sheen.setAttribute("data-crystal-kind","sheen");
      sheen.setAttribute("fill", "url(#crystalSheen)");
      setStyleProp(sheen, "fill", "url(#crystalSheen)");
      sheen.setAttribute("stroke","none");
      setStyleProp(sheen, "stroke","none");
      sheen.setAttribute("pointer-events","none");
      const after = el.nextSibling;
      if (after && after.getAttribute?.("data-crystal-kind")==="tex") {
        el.parentNode.insertBefore(sheen, after.nextSibling);
      } else {
        el.parentNode.insertBefore(sheen, el.nextSibling);
      }
    }
  }

  // Apply the current/last known cursor position immediately.
  // This prevents the overlay from rendering with incomplete gradient/filter values
  // before the pointer enters the preview for the first time.
  if (seq === CRYSTAL_REFRESH_SEQ && state.crystal.enabled) scheduleShine();
}
function enforceCrystalDefaults() {
  state.crystal.intensity = 0.7;
  state.crystal.scale = 0.35;
  state.crystal.angle = 0;
  state.crystal.sheenOpacity = 0.41;
  state.crystal.hueMaxDeg = 90;
}

function setCrystalEnabled(on) {
  state.crystal.enabled = !!on;
  if (!state.crystal.enabled) {
    CRYSTAL_REFRESH_SEQ++;
    clearCrystalClones();
    updateHueFilter(0);
    return;
  }
  enforceCrystalDefaults();
  if (!state.crystal.texture && CRYSTAL_MANIFEST.length) {
    state.crystal.texture = CRYSTAL_MANIFEST[0];
  }
  ensureCrystalMouseDefaults();
  refreshCrystalOverlay().then(() => scheduleShine());
}

function setCrystalParams(patch) {
  // Ignorujemy zewnętrzne modyfikacje parametrów — wartości są stałe
  enforceCrystalDefaults();
  if (!state.crystal.enabled) return;
  refreshCrystalOverlay();
}


    // ——— Obsługa myszy: parallax + połysk + hue-shift ———
    const mouseState = { mx:0.5, my:0.5, raf:false, rect:null, initialized:false };
    function ensureCrystalMouseDefaults(){
      if (!Number.isFinite(mouseState.mx)) mouseState.mx = 0.5;
      if (!Number.isFinite(mouseState.my)) mouseState.my = 0.5;
      mouseState.mx = Math.max(0, Math.min(1, mouseState.mx));
      mouseState.my = Math.max(0, Math.min(1, mouseState.my));
      mouseState.initialized = true;
    }
    function updateMouseRect(){ mouseState.rect = document.getElementById("stage").getBoundingClientRect(); }
    function toStageNorm(e){
      if (!mouseState.rect) updateMouseRect();
      const r = mouseState.rect;
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top)  / r.height;
      return { mx: Math.max(0,Math.min(1,x)), my: Math.max(0,Math.min(1,y)) };
    }
    function scheduleShine() {
  if (mouseState.raf) return;
  mouseState.raf = true;
  requestAnimationFrame(()=>{
    mouseState.raf = false;
    const {mx,my} = mouseState;

    if (!state.crystal.enabled) { updateHueFilter(0); return; }

    if (state.crystal.shineEnabled) {
      updateSheenGradient(mx*STAGE_W, my*STAGE_H);
    }

    if (state.crystal.texture) {
      updatePatternParallax(mx,my);
      if (state.crystal.hueShiftEnabled) {
        const maxD = state.crystal.hueMaxDeg || 0;
        const angle = (mx - 0.5) * 2 * maxD;
        updateHueFilter(angle);
      } else {
        updateHueFilter(0);
      }
    } else {
      updateHueFilter(0);
    }
  });
}

    // =========================
    // 8) EKSPORT / PRESET
    // =========================
    function downloadBlob(filename, blob) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
    }
    function exportSVG() {
      const svg = document.getElementById("stage").cloneNode(true);
      svg.setAttribute("width","1000"); svg.setAttribute("height","1000");
      const xml = new XMLSerializer().serializeToString(svg);
      downloadBlob("pony.svg", new Blob([xml], {type:"image/svg+xml"}));
    }
    function exportPNG() {
      const svg = document.getElementById("stage");
      const xml = new XMLSerializer().serializeToString(svg);
      const svgUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(xml);
      const img = new Image();
      img.onload = function(){
        const canvas = document.createElement("canvas");
        canvas.width = 1000; canvas.height = 1000;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => blob && downloadBlob("pony.png", blob), "image/png");
      };
      img.crossOrigin = "anonymous";
      img.src = svgUrl;
    }
    function savePreset() {
      const preset = {
        colors: state.colors,
        selected: state.selected,
        links: state.links,
        crystal: state.crystal,
        eyeTransform: state.eyeTransform,
        cutiemarkTransform: state.cutiemarkTransform,
        gemColor: state.gemColor
      };
      downloadBlob("preset.json", new Blob([JSON.stringify(preset,null,2)], {type:"application/json"}));
    }
    function loadPreset(obj) {
      if (obj.colors) Object.assign(state.colors, obj.colors);
      if (obj.links) Object.assign(state.links, obj.links);
      if (obj.crystal) Object.assign(state.crystal, obj.crystal);
      if (obj.eyeTransform) Object.assign(state.eyeTransform, obj.eyeTransform);
      state.eyeTransform.x ??= 0;
      state.eyeTransform.y ??= 0;
      state.eyeTransform.rotation ??= 0;
      state.eyeTransform.scale ??= 1;
      if (obj.cutiemarkTransform) Object.assign(state.cutiemarkTransform, obj.cutiemarkTransform);
      state.cutiemarkTransform.hue ??= 0;
      state.cutiemarkTransform.saturation = Math.max(1, state.cutiemarkTransform.saturation ?? 100);
      state.cutiemarkTransform.lightness = Math.max(1, state.cutiemarkTransform.lightness ?? 100);
      state.cutiemarkTransform.flip ??= false;
      if (obj.gemColor) Object.assign(state.gemColor, obj.gemColor);
      state.gemColor.hue ??= 0;
      state.gemColor.saturation = Math.max(1, state.gemColor.saturation ?? 100);
      state.gemColor.lightness = Math.max(1, state.gemColor.lightness ?? 100);
      if (state.links.tailMatchesMane) propagateManeToTail();

      const jobs = [];
      if (obj.selected) {
        for (const cat of CATEGORIES) {
          const f = obj.selected[cat];
          if (f) jobs.push(setAsset(cat, f));
        }
      }
      Promise.allSettled(jobs).then(()=>{
        buildColorsForm();
        reapplyAllColors();
        rebuildStage();
        if (state.crystal.enabled) refreshCrystalOverlay();
      });
    }

    // =========================
    // 9) Upload folderu + manifesty
    // =========================
    function normalizePath(p){return p.replace(/\\/g,"/")}
    function extractAssetsRelativePath(full){const n=full.toLowerCase();const idx=n.lastIndexOf("assets/");return idx>=0?full.slice(idx):full}
    function buildManifestFromVirtualFS() {
      for (const c of CATEGORIES) ASSET_MANIFEST[c] = [];
      CRYSTAL_MANIFEST.length = 0;
      IRIS_MANIFEST.length = 0;
      EYE_GLMR_MANIFEST.length = 0;
      for (const key of virtualFS.keys()) {
        const parts = normalizePath(key).split("/");
        if (parts.length < 3) continue;
        const category = parts[1];
        const fileName = parts.slice(2).join("/");
        const low = fileName.toLowerCase();
        if ((CATEGORIES.includes(category) || category==="body-merpony" || category==="tail-merpony") && low.endsWith(".svg")) {
          if (!ASSET_MANIFEST[category].includes(fileName)) ASSET_MANIFEST[category].push(fileName);
        
        if (category === "iris" && low.endsWith(".svg")) {
          if (!IRIS_MANIFEST.includes(fileName)) IRIS_MANIFEST.push(fileName);
        }
        if (category === "glimmer" && low.endsWith(".svg")) {
          if (!EYE_GLMR_MANIFEST.includes(fileName)) EYE_GLMR_MANIFEST.push(fileName);
        }
}
        if (category === "iris" && low.endsWith(".svg")) {
          if (!IRIS_MANIFEST.includes(fileName)) IRIS_MANIFEST.push(fileName);
        }
        if (category === "glimmer" && low.endsWith(".svg")) {
          if (!EYE_GLMR_MANIFEST.includes(fileName)) EYE_GLMR_MANIFEST.push(fileName);
        }
        if (category === "crystal") {
          if (/\.(png|jpg|jpeg|webp|svg)$/i.test(low)) {
            if (!CRYSTAL_MANIFEST.includes(fileName)) CRYSTAL_MANIFEST.push(fileName);
          }
        }
      }
      for (const c of CATEGORIES) ASSET_MANIFEST[c].sort();
      CRYSTAL_MANIFEST.sort();
      IRIS_MANIFEST.sort();
      EYE_GLMR_MANIFEST.sort();
    }
    async function autoLoadFirstFromManifest() {
      const jobs = [];
      for (const cat of CATEGORIES) {
        const list = ASSET_MANIFEST[cat] || [];
        if (!list.length) continue;
        const pick = (state.selected[cat] && list.includes(state.selected[cat])) ? state.selected[cat] : list[0];
        jobs.push(setAsset(cat, pick));
      
      // Eye overlay: choose first available iris/glimmer if not set
      if (!state.eyeOverlay.iris && IRIS_MANIFEST.length) {
        state.eyeOverlay.iris = IRIS_MANIFEST[0];
      }
      if (!state.eyeOverlay.glimmer && EYE_GLMR_MANIFEST.length) {
        state.eyeOverlay.glimmer = EYE_GLMR_MANIFEST[0];
      }
      await Promise.resolve();
      refreshEyeOverlay();
}
      await Promise.allSettled(jobs);
      if (!state.crystal.texture && CRYSTAL_MANIFEST.length) {
        state.crystal.texture = CRYSTAL_MANIFEST[0];
      }
      if (state.links?.tailMatchesMane) { propagateManeToTail(); reapplyAllColors(); }
    }
    async function loadManifestFromServer() {
      try {
        const resp = await fetchWithRetry("assets/manifest.json", {}, 3, 250);
        if (!resp.ok) throw new Error(`assets/manifest.json: ${resp.status} ${resp.statusText}`);
        const manifest = await resp.json();

        for (const c of CATEGORIES) ASSET_MANIFEST[c] = [];
        ASSET_MANIFEST["body-merpony"] = [];
        ASSET_MANIFEST["tail-merpony"] = [];
        CRYSTAL_MANIFEST.length = 0;
        IRIS_MANIFEST.length = 0;
        EYE_GLMR_MANIFEST.length = 0;

        for (const key of [...CATEGORIES, "body-merpony", "tail-merpony"]) {
          if (Array.isArray(manifest[key])) {
            ASSET_MANIFEST[key] = manifest[key]
              .filter(fileName => typeof fileName === "string" && fileName.toLowerCase().endsWith(".svg"))
              .sort();
          }
        }

        if (Array.isArray(manifest.iris)) {
          IRIS_MANIFEST.push(...manifest.iris
            .filter(fileName => typeof fileName === "string" && fileName.toLowerCase().endsWith(".svg"))
            .sort());
        }
        if (Array.isArray(manifest.glimmer)) {
          EYE_GLMR_MANIFEST.push(...manifest.glimmer
            .filter(fileName => typeof fileName === "string" && fileName.toLowerCase().endsWith(".svg"))
            .sort());
        }
        if (Array.isArray(manifest.crystal)) {
          CRYSTAL_MANIFEST.push(...manifest.crystal
            .filter(fileName => typeof fileName === "string" && /\.(png|jpg|jpeg|webp|svg)$/i.test(fileName))
            .sort());
        }

        const status = document.getElementById("modeStatus");
        if (status) status.innerHTML = 'Tryb: <b>Online</b> — wczytano manifest z assets/manifest.json';
        return true;
      } catch (err) {
        console.warn("Nie udało się wczytać assets/manifest.json", err);
        const status = document.getElementById("modeStatus");
        if (status) status.innerHTML = 'Tryb: <b>Online</b> — brak lub błąd assets/manifest.json';
        return false;
      }
    }

    async function handleDirUpload(files) {
      virtualFS.clear();
      for (const f of files) {
        const rel = extractAssetsRelativePath(normalizePath(f.webkitRelativePath || f.name));
        if (rel.toLowerCase().startsWith("assets/")) virtualFS.set(rel, f);
      }
      useVirtualFS = true;
      document.getElementById("modeStatus").innerHTML =
        'Tryb: <b>Lokalny (upload)</b> — wczytano ' + virtualFS.size + ' plików';
      buildManifestFromVirtualFS();
      buildAssetsForm();
      buildColorsForm();
      await autoLoadFirstFromManifest();
    }

    // =========================
    // 10) Inicjalizacja + eventy myszy
    // =========================
    function initUI() {
      buildAssetsForm();
      buildColorsForm();

      document.getElementById("btnExportSVG").addEventListener("click", exportSVG);
      document.getElementById("btnExportPNG").addEventListener("click", exportPNG);
      document.getElementById("btnSavePreset").addEventListener("click", savePreset);
      document.getElementById("filePreset").addEventListener("change", async e => {
        const file = e.target.files?.[0]; if (!file) return;
        try { loadPreset(JSON.parse(await file.text())); } catch { alert("Nieprawidłowy preset JSON."); }
      });

      // ——— Mysza / dotyk: aktualizuj połysk i hue-shift z throttlingiem (rAF)
      const stage = document.getElementById("stage");
      const move = (e) => { const n=toStageNorm(e); mouseState.mx=n.mx; mouseState.my=n.my; scheduleShine(); };
      stage.addEventListener("pointerdown", move);
      stage.addEventListener("pointermove", move);
      stage.addEventListener("pointerenter", e => { updateMouseRect(); move(e); });
      window.addEventListener("resize", updateMouseRect);
      stage.addEventListener("pointerleave", () => {
        // Keep the last valid pointer position instead of snapping back to the center.
        // The center is used only before the first pointer reading.
        scheduleShine();
      });
    }

    initUI();

    (async function autoLoadFirst(){
      if (useVirtualFS) return;

      const ok = await loadManifestFromServer();
      if (!ok) return;

      buildAssetsForm();
      buildColorsForm();
      await autoLoadFirstFromManifest();
    })();
  </script>
